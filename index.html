<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crow DEX Aggregator</title>
    <!-- Modern Font: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <!-- App Background Animation -->
      <div class="bg-glow"></div>
      <div class="blur-overlay"></div>

      <!-- Header -->
      <header class="app-header">
        <div class="logo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-feather"><path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"></path><line x1="16" y1="8" x2="2" y2="22"></line><line x1="17.5" y1="15" x2="9" y2="15"></line></svg>
          <h1>Crow</h1>
        </div>
        <nav class="header-nav">
          <a href="#" class="active">Swap</a>
          <a href="#">Limit</a>
          <a href="#">DCA</a>
          <a href="#">Bridge</a>
        </nav>
        <div class="header-actions">
          <button class="wallet-btn">Connect Wallet</button>
        </div>
      </header>

      <!-- Main Content -->
      <main class="main-container">
        <!-- Swap Container -->
        <div class="swap-card">
          <!-- Header of Swap Card -->
          <div class="swap-header">
            <h3>Swap</h3>
            <div class="swap-settings">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </div>
          </div>

          <!-- Input (You Pay) -->
          <div class="token-input-group">
            <div class="input-header">
              <span>You pay</span>
            </div>
            <div class="input-body">
              <button class="token-selector" id="pay-token-btn">
                <img src="https://cryptologos.cc/logos/solana-sol-logo.png" alt="SOL" class="token-icon" />
                <span class="token-symbol">SOL</span>
                <span class="dropdown-icon">▼</span>
              </button>
              <input type="number" class="token-amount" id="pay-amount" placeholder="0.00" value="" />
            </div>
          </div>

          <!-- Invert Button -->
          <div class="invert-section">
            <button class="invert-btn">
              ↓
            </button>
          </div>

          <!-- Output (You Receive) -->
          <div class="token-input-group">
            <div class="input-header">
              <span>You receive</span>
            </div>
            <div class="input-body">
              <button class="token-selector" id="receive-token-btn">
                <img src="https://cryptologos.cc/logos/usd-coin-usdc-logo.png" alt="USDC" class="token-icon" />
                <span class="token-symbol">USDC</span>
                <span class="dropdown-icon">▼</span>
              </button>
              <input type="number" class="token-amount" id="receive-amount" placeholder="0.00" readonly />
            </div>
          </div>

          <!-- Best Route Display -->
          <div class="route-display" id="route-panel">
            <div class="route-header">
              <span class="route-label">Finding best route...</span>
              <div class="route-loader"></div>
            </div>
            <div class="route-hops" id="route-hops">
              <!-- Route hops rendered by JS -->
            </div>
          </div>

          <!-- Action Button -->
          <button class="action-btn" id="swap-btn">Enter an amount</button>
        </div>
      </main>
    </div>
    
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
